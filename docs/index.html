  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult,
             GoogleAuthProvider, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, update, push, remove }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAU3KvbtKbTsRfT34ZiwFFR2rDyIwXVUDs",
      authDomain: "family-shopping-list-c81bf.firebaseapp.com",
      databaseURL: "https://family-shopping-list-c81bf-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "family-shopping-list-c81bf",
      storageBucket: "family-shopping-list-c81bf.firebasestorage.app",
      messagingSenderId: "972561054316",
      appId: "1:972561054316:web:24bad4bf0d6ca382073649"
    };

    const ALLOWED = ["matan4749@gmail.com", "hodayane20@gmail.com"];
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();
    let currentUser = null;
    let shoppingStarted = false;

    // Keep user logged in persistently
    setPersistence(auth, browserLocalPersistence).catch(()=>{});

    // Handle redirect result (fast login on mobile)
    getRedirectResult(auth).then(result => {
      if (result?.user && !ALLOWED.includes(result.user.email)) {
        signOut(auth);
        toast("⛔ אין לך גישה", "error");
      }
    }).catch(()=>{});

    window.signInWithGoogle = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        if (!ALLOWED.includes(result.user.email)) {
          await signOut(auth);
          toast("⛔ אין לך גישה לאפליקציה", "error");
        }
      } catch(e) {
        if (['auth/popup-blocked','auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(e.code)) {
          signInWithRedirect(auth, provider);
        } else {
          toast("שגיאה: " + e.message, "error");
        }
      }
    };

    window.signOutUser = () => signOut(auth);

    onAuthStateChanged(auth, user => {
      if (user && ALLOWED.includes(user.email)) {
        currentUser = user;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        document.getElementById('userName').textContent = user.displayName?.split(' ')[0] || user.email.split('@')[0];
        shoppingStarted = false;
        listenItems();
        listenNotifications();
        requestPushPermission();
      } else {
        currentUser = null;
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appScreen').style.display = 'none';
      }
    });

    // ---- ITEMS ----
    let allItems = {};
    let prevTotalCount = 0;

    function listenItems() {
      onValue(ref(db, 'items'), snap => {
        allItems = snap.val() || {};
        renderList();
        prevTotalCount = Object.keys(allItems).length;
      });
    }

    window.addItems = async () => {
      const raw = document.getElementById('rawInput').value.trim();
      if (!raw) return;
      const parsed = parseRaw(raw);
      if (!parsed.length) return;
      const updates = {};
      parsed.forEach(item => {
        const key = push(ref(db, 'items')).key;
        updates[key] = { ...item, done: false, addedBy: currentUser.email, at: Date.now() };
      });
      await update(ref(db, 'items'), updates);
      document.getElementById('rawInput').value = '';
      document.getElementById('rawInput').style.height = 'auto';
      shoppingStarted = false;
      await push(ref(db, 'notifications'), {
        type: 'new_list',
        by: currentUser.email,
        name: currentUser.displayName?.split(' ')[0] || currentUser.email.split('@')[0],
        count: parsed.length,
        at: Date.now()
      });
      toast(`✅ נוספו ${parsed.length} פריטים`);
      closeAddPanel();
    };

    window.toggleItem = async (key) => {
      const item = allItems[key];
      if (!item) return;
      const nowDone = !item.done;

      await update(ref(db, `items/${key}`), {
        done: nowDone,
        doneBy: nowDone ? currentUser.email : null,
        doneAt: nowDone ? Date.now() : null
      });

      // First check = shopping started
      const prevDoneCount = Object.values(allItems).filter(v => v.done).length;
      if (nowDone && prevDoneCount === 0 && !shoppingStarted) {
        shoppingStarted = true;
        await push(ref(db, 'notifications'), {
          type: 'shopping_started',
          by: currentUser.email,
          name: currentUser.displayName?.split(' ')[0] || currentUser.email.split('@')[0],
          at: Date.now()
        });
      }

      // All items done = finished
      const allEntries = Object.entries(allItems);
      if (allEntries.length > 0) {
        const allDoneNow = allEntries.every(([k, v]) => k === key ? nowDone : v.done);
        if (allDoneNow) {
          await push(ref(db, 'notifications'), {
            type: 'done',
            by: currentUser.email,
            name: currentUser.displayName?.split(' ')[0] || currentUser.email.split('@')[0],
            at: Date.now()
          });
          toast("🎉 כל הפריטים נלקטו! מעולה!", 'success', 4000);
        }
      }
    };

    window.deleteItem = async (key) => {
      await remove(ref(db, `items/${key}`));
    };

    window.clearDone = async () => {
      const doneKeys = Object.keys(allItems).filter(k => allItems[k].done);
      if (!doneKeys.length) return;
      const allDone = Object.keys(allItems).length === doneKeys.length;
      const updates = {};
      doneKeys.forEach(k => updates[k] = null);
      await update(ref(db, 'items'), updates);
      if (allDone) {
        await push(ref(db, 'notifications'), {
          type: 'done',
          by: currentUser.email,
          name: currentUser.displayName?.split(' ')[0] || currentUser.email.split('@')[0],
          at: Date.now()
        });
        toast("🎉 הקניות הסתיימו!", 'success', 4000);
      } else {
        toast("🗑️ נמחקו פריטים שנלקטו");
      }
    };

    window.clearAll = async () => {
      if (!confirm('למחוק את כל הרשימה?')) return;
      await remove(ref(db, 'items'));
      shoppingStarted = false;
      toast("🗑️ הרשימה נוקתה");
    };

    // ---- NOTIFICATIONS ----
    let lastNotifAt = Date.now();

    function listenNotifications() {
      onValue(ref(db, 'notifications'), snap => {
        const data = snap.val();
        if (!data || !currentUser) return;
        const all = Object.values(data).sort((a, b) => a.at - b.at);
        const latest = all[all.length - 1];
        if (!latest || latest.at <= lastNotifAt || latest.by === currentUser.email) return;
        lastNotifAt = latest.at;

        const who = latest.name || latest.by.split('@')[0];

        if (latest.type === 'new_list') {
          const msg = `${who} הוסיפ/ה ${latest.count} פריטים לרשימה`;
          toast('📋 ' + msg, 'info', 5000);
          pushNotify("📋 רשימת קניות חדשה", msg);
          beep();
        }
        if (latest.type === 'shopping_started') {
          const msg = `${who} התחיל/ה לקנות!`;
          toast('🛒 ' + msg, 'info', 5000);
          pushNotify("🛒 הקניות התחילו!", msg);
          beep();
        }
        if (latest.type === 'done') {
          const msg = `${who} סיים/ה את הקניות!`;
          toast('🎉 ' + msg, 'success', 6000);
          pushNotify("🎉 הקניות הסתיימו!", msg);
          beepSuccess();
        }
      });
    }

    // ---- PWA SERVICE WORKER ----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    // ---- PUSH (via Service Worker) ----
    async function requestPushPermission() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'denied') return;
      setTimeout(async () => {
        await Notification.requestPermission();
      }, 2000);
    }

    function pushNotify(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        try {
          if (navigator.serviceWorker.controller) {
            navigator.serviceWorker.ready.then(reg => {
              reg.showNotification(title, {
                body, icon: '/icons/icon-192.png', badge: '/icons/icon-72.png',
                tag: 'shopping', renotify: true, vibrate: [200, 100, 200]
              });
            });
          } else {
            new Notification(title, { body, tag: 'shopping', renotify: true });
          }
        } catch(e) {}
      }
    }

    function beep() {
      try {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.15);
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(); osc.stop(ctx.currentTime + 0.4);
      } catch(e) {}
    }

    function beepSuccess() {
      try {
        const ctx = new AudioContext();
        [523, 659, 784, 1047].forEach((freq, i) => {
          const osc = ctx.createOscillator(), g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.frequency.value = freq;
          const t = ctx.currentTime + i * 0.12;
          g.gain.setValueAtTime(0.15, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t); osc.stop(t + 0.3);
        });
      } catch(e) {}
    }

    window._allItems = () => allItems;
  </script>

  <style>
    :root {
      --bg:#f5f3ee;--bg2:#edeae3;--card:#fff;--border:#e2ddd6;--border2:#d4cfc7;
      --text:#2c2820;--text2:#7a7469;--text3:#b0aa9f;
      --green:#2d7a4f;--green-light:#e8f5ee;--green-mid:#c3e8d2;
      --blue:#2563a8;--blue-light:#e8f0fb;
      --red:#c0392b;--red-light:#fdecea;--orange:#d97706;
      --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.07);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden;-webkit-font-smoothing:antialiased}

    #loginScreen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px 32px;text-align:center;width:100%;max-width:360px;box-shadow:var(--shadow-lg);animation:fadeUp .4s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .login-logo{font-size:56px;margin-bottom:16px}
    .login-title{font-size:26px;font-weight:900;margin-bottom:6px}
    .login-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:32px}
    .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;background:var(--text);color:#fff;border:none;border-radius:var(--radius);font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
    .google-btn:hover{opacity:.88;transform:translateY(-1px)}
    .glogo{width:20px;height:20px;border-radius:50%;background:white;padding:2px}
    .login-note{font-size:12px;color:var(--text3);margin-top:16px}

    #appScreen{display:none}
    .app{max-width:540px;margin:0 auto;padding:0 0 calc(88px + var(--safe-bottom));min-height:100vh}

    .header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 20px 14px;position:sticky;top:0;z-index:50}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .header-brand{display:flex;align-items:center;gap:8px}
    .header-brand-icon{font-size:22px}
    .header-brand-name{font-size:19px;font-weight:900}

    'מגבוני':'ניקיון וטיפוח','תחבושות':'ניקיון וטיפוח','תחבושת':'ניקיון וטיפוח',
    // קפואים
    'גלידה':'קפואים','ארטיק':'קפואים','שניצל קפוא':'קפואים',
    'ירקות קפואים':'קפואים','דגים קפואים':'קפואים','עוגת גלידה':'קפואים',
    'פיצה קפואה':'קפואים','בצק עלים':'קפואים','בצק':'קפואים',
    // שתייה
    'מיץ':'שתייה','מיצים':'שתייה','מים':'שתייה','קפה':'שתייה',
    'תה':'שתייה','קולה':'שתייה','בירה':'שתייה','יין':'שתייה',
    'סודה':'שתייה','ספריט':'שתייה','פאנטה':'שתייה','שוקו':'שתייה',
    'קקאו':'שתייה','אנרגי':'שתייה','רד בול':'שתייה',
    // ממתקים
    'שוקולד':'ממתקים ונשנושים','ביסקוויט':'ממתקים ונשנושים','חטיף':'ממתקים ונשנושים',
    'חטיפים':'ממתקים ונשנושים','עוגיות':'ממתקים ונשנושים','סוכריות':'ממתקים ונשנושים',
    'במבה':'ממתקים ונשנושים','ביסלי':'ממתקים ונשנושים','קרקרים':'ממתקים ונשנושים',
    'פרינגלס':'ממתקים ונשנושים','מרשמלו':'ממתקים ונשנושים','הלווה':'ממתקים ונשנושים',
    'ריבה':'ממתקים ונשנושים','דבש':'ממתקים ונשנושים','נוטלה':'ממתקים ונשנושים',
    'ממרח':'ממתקים ונשנושים','שקדים':'ממתקים ונשנושים','אגוזים':'ממתקים ונשנושים',
    'ציפס':'ממתקים ונשנושים','פופקורן':'ממתקים ונשנושים','לקריץ':'ממתקים ונשנושים',
  };

  function getCat(name) {
    const n = name.toLowerCase().trim();
    if (KW[n]) return KW[n]; // exact match
    // partial match — longest key wins
    let best = null, bestLen = 0;
    for (const [kw, cat] of Object.entries(KW)) {
      if (n.includes(kw) && kw.length > bestLen) {
        best = cat; bestLen = kw.length;
      }
    }
    return best || 'אחר';
  }

  function parseRaw(text) {
    const lines = text.split(/[\n,،;]+/).map(l=>l.trim()).filter(l=>l.length>1);
    return lines.map(line => {
      const cleaned = line.replace(/^\d+[\.\)]\s*/, '').trim();
      const qtyMatch = cleaned.match(/(\d+[\d.,]*\s*(ק"ג|גרם|ליטר|יח|יחידות|בקבוק|שקית|חבילה|קופסא|תריסר|כוס|x\d+)?)/i);
      const qty = qtyMatch ? qtyMatch[0].trim() : '1 יח׳';
      const name = cleaned.replace(/\s*x?\d+[\d.,]*\s*(ק"ג|גרם|ליטר|יח|יחידות|בקבוק|שקית|חבילה|קופסא|תריסר|כוס)?/gi,'').trim() || cleaned;
      return { name, qty, category: getCat(name) };
    }).filter(i=>i.name.length>0);
  }

  let editMode = false;
  let collapsedCats = new Set();

  function renderList() {
    const items = window._allItems ? window._allItems() : {};
    const container = document.getElementById('listContainer');
    const entries = Object.entries(items);
    const pending = entries.filter(([,v])=>!v.done);
    const done = entries.filter(([,v])=>v.done);

    updateProgress(pending.length, done.length);

    if (!entries.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-emoji">🛒</div><div class="empty-title">הרשימה ריקה</div><div class="empty-sub">לחץ על "הוסף פריטים"<br>ורשום בחופשיות מה צריך</div></div>`;
      return;
    }

    const grouped = {};
    Object.keys(CATS).forEach(c => grouped[c] = []);
    pending.forEach(([k,v]) => {
      const cat = v.category || 'אחר';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push([k,v]);
    });

    let html = '';
    for (const [cat, citems] of Object.entries(grouped)) {
      if (!citems.length) continue;
      const icon = CATS[cat] || '🛍️';
      const collapsed = collapsedCats.has(cat);
      html += `<div class="cat-section">
        <div class="cat-header ${collapsed?'collapsed':''}" onclick="toggleCat('${cat}')">
          <span class="cat-header-icon">${icon}</span>
          <span class="cat-header-name">${cat}</span>
          <span class="cat-header-count">${citems.length}</span>
          <span class="cat-header-arrow">▾</span>
        </div>
        <div class="cat-items ${collapsed?'hidden':''} ${editMode?'edit-active':''}">
          ${citems.map(([k,v]) => itemHTML(k,v)).join('')}
        </div></div>`;
    }

    if (done.length) {
      html += `<div class="done-divider"><div class="done-line"></div><div class="done-label">✓ נלקח מהמדף (${done.length})</div><div class="done-line"></div></div>
        <div class="${editMode?'edit-active':''}">${done.map(([k,v])=>itemHTML(k,v)).join('')}</div>`;
    }

    container.innerHTML = html;
  }

  function itemHTML(key, item) {
    return `<div class="item-card ${item.done?'done':''}" id="item-${key}">
      <div class="cb" onclick="toggleItem('${key}')"><span class="cb-check">✓</span></div>
      <div class="item-body"><div class="item-name">${item.name}</div></div>
      <div class="item-qty">${item.qty}</div>
      <button class="item-delete" onclick="deleteItem('${key}')">✕</button>
    </div>`;
  }

  function updateProgress(pendingCount, doneCount) {
    const total = pendingCount + doneCount;
    const pct = total ? Math.round(doneCount/total*100) : 0;
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('progressText').textContent = `${doneCount} / ${total}`;
  }

  function toggleEditMode() {
    editMode = !editMode;
    const btn = document.getElementById('editBtn');
    const bar = document.getElementById('editBar');
    btn.textContent = editMode ? '✓ סיים' : '✏️ עריכה';
    btn.classList.toggle('active', editMode);
    bar.classList.toggle('show', editMode);
    document.getElementById('appInner').style.paddingTop = editMode ? '48px' : '0';
    renderList();
  }

  function toggleCat(cat) {
    if (collapsedCats.has(cat)) collapsedCats.delete(cat);
    else collapsedCats.add(cat);
    renderList();
  }

  function openAddPanel() {
    document.getElementById('addPanel').classList.add('open');
    document.getElementById('overlay').classList.add('show');
    setTimeout(() => document.getElementById('rawInput').focus(), 350);
  }

  function closeAddPanel() {
    document.getElementById('addPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  let toastTimer;
  function toast(msg, type='default', dur=2800) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'), dur);
  }

  window.renderList = renderList;
  window.toast = toast;
  window.toggleCat = toggleCat;
  window.openAddPanel = openAddPanel;
  window.closeAddPanel = closeAddPanel;
  window.toggleEditMode = toggleEditMode;

  document.addEventListener('DOMContentLoaded', () => {
    const ta = document.getElementById('rawInput');
    if (ta) {
      ta.addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,180)+'px'; });
      ta.addEventListener('keydown', e => { if(e.key==='Enter'&&e.ctrlKey){ e.preventDefault(); addItems(); } });
    }
  });
</script>
</body>
</html>
