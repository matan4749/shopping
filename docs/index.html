<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <title>🧺 קניות שלנו</title>

  <script>
    (function() {
      const manifest = {"name":"קניות שלנו","short_name":"קניות","description":"רשימת קניות משפחתית מסונכרנת","start_url":"/shopping/","display":"standalone","orientation":"portrait","background_color":"#0f1117","theme_color":"#22c55e","lang":"he","dir":"rtl","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2322c55e'/%3E%3Ctext y='.9em' font-size='72' x='12'%3E🧺%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml","purpose":"any maskable"}]};
      const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
      document.head.appendChild(Object.assign(document.createElement('link'), {rel:'manifest', href:URL.createObjectURL(blob)}));
    })();
  </script>
  <meta name="theme-color" content="#22c55e"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="קניות"/>

  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult,
             GoogleAuthProvider, signOut, onAuthStateChanged, setPersistence, indexedDBLocalPersistence, browserLocalPersistence }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, update, push, remove, get }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAU3KvbtKbTsRfT34ZiwFFR2rDyIwXVUDs",
      authDomain: "family-shopping-list-c81bf.firebaseapp.com",
      databaseURL: "https://family-shopping-list-c81bf-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "family-shopping-list-c81bf",
      storageBucket: "family-shopping-list-c81bf.firebasestorage.app",
      messagingSenderId: "972561054316",
      appId: "1:972561054316:web:24bad4bf0d6ca382073649"
    };

    const ALLOWED = ["matan4749@gmail.com", "hodayane20@gmail.com"];
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();
    let currentUser = null;
    let shoppingStarted = false;
    let currentListId = 'default';

    // ⚡ Fast persistence — skip login screen on revisit
    setPersistence(auth, indexedDBLocalPersistence).catch(() =>
      setPersistence(auth, browserLocalPersistence).catch(() => {})
    );

    getRedirectResult(auth).then(result => {
      if (result?.user && !ALLOWED.includes(result.user.email)) {
        signOut(auth); toast("⛔ אין לך גישה", "error");
      }
    }).catch(() => {});

    window.signInWithGoogle = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        if (!ALLOWED.includes(result.user.email)) {
          await signOut(auth); toast("⛔ אין לך גישה לאפליקציה", "error");
        }
      } catch(e) {
        if (['auth/popup-blocked','auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(e.code)) {
          signInWithRedirect(auth, provider);
        } else { toast("שגיאה: " + e.message, "error"); }
      }
    };

    window.signOutUser = () => signOut(auth);

    onAuthStateChanged(auth, user => {
      if (user && ALLOWED.includes(user.email)) {
        currentUser = user;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        document.getElementById('userName').textContent = user.displayName?.split(' ')[0] || user.email.split('@')[0];
        shoppingStarted = false;
        loadLists();
        listenNotifications();
        requestPushPermission();
      } else {
        currentUser = null;
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appScreen').style.display = 'none';
      }
    });

    // ---- LISTS MANAGEMENT ----
    let allLists = {};
    let allItems = {};
    let itemsListener = null;

    async function loadLists() {
      onValue(ref(db, 'lists'), snap => {
        allLists = snap.val() || {};
        // Create default list if none exist
        if (Object.keys(allLists).length === 0) {
          update(ref(db, 'lists'), { default: { name: 'רשימה ראשית', createdAt: Date.now(), createdBy: currentUser.email } });
          allLists = { default: { name: 'רשימה ראשית', createdAt: Date.now() } };
        }
        // Set current list to first if not set
        if (!allLists[currentListId]) currentListId = Object.keys(allLists)[0];
        renderListsBar();
        switchList(currentListId);
      });
    }

    window.switchList = (listId) => {
      currentListId = listId;
      shoppingStarted = false;
      // Remove previous listener
      if (itemsListener) { itemsListener(); itemsListener = null; }
      listenItems();
      renderListsBar();
    };

    window.createNewList = async () => {
      const name = prompt('שם הרשימה החדשה:');
      if (!name || !name.trim()) return;
      const key = push(ref(db, 'lists')).key;
      await update(ref(db, 'lists'), { [key]: { name: name.trim(), createdAt: Date.now(), createdBy: currentUser.email } });
      currentListId = key;
      toast(`✅ נוצרה רשימה: ${name.trim()}`);
    };

    window.deleteCurrentList = async () => {
      if (Object.keys(allLists).length <= 1) { toast('❌ לא ניתן למחוק את הרשימה האחרונה', 'error'); return; }
      if (!confirm(`למחוק את הרשימה "${allLists[currentListId]?.name}"?`)) return;
      await remove(ref(db, `lists/${currentListId}`));
      await remove(ref(db, `items_v2/${currentListId}`));
      currentListId = Object.keys(allLists).find(k => k !== currentListId) || 'default';
      toast('🗑️ הרשימה נמחקה');
    };

    function renderListsBar() {
      const bar = document.getElementById('listsBar');
      const listName = document.getElementById('currentListName');
      const listCount = Object.keys(allLists).length;
      listName.textContent = allLists[currentListId]?.name || 'רשימה';
      
      bar.innerHTML = Object.entries(allLists).map(([id, list]) =>
        `<button class="list-tab ${id === currentListId ? 'active' : ''}" onclick="switchList('${id}')">${list.name}</button>`
      ).join('') + `<button class="list-tab list-tab-new" onclick="createNewList()">＋</button>`;
    }

    // ---- ITEMS ----
    function listenItems() {
      const itemsRef = ref(db, `items_v2/${currentListId}`);
      itemsListener = onValue(itemsRef, snap => {
        allItems = snap.val() || {};
        renderList();
      });
    }

    window.addItems = async () => {
      const raw = document.getElementById('rawInput').value.trim();
      if (!raw) return;
      const parsed = parseRaw(raw);
      if (!parsed.length) return;
      const updates = {};
      parsed.forEach(item => {
        const key = push(ref(db, `items_v2/${currentListId}`)).key;
        updates[key] = { ...item, done: false, addedBy: currentUser.email, at: Date.now() };
      });
      await update(ref(db, `items_v2/${currentListId}`), updates);
      document.getElementById('rawInput').value = '';
      document.getElementById('rawInput').style.height = 'auto';
      shoppingStarted = false;
      await push(ref(db, 'notifications'), {
        type: 'new_list', by: currentUser.email,
        name: currentUser.displayName?.split(' ')[0] || currentUser.email.split('@')[0],
        count: parsed.length, listName: allLists[currentListId]?.name || 'רשימה', at: Date.now()
      });
      toast(`✅ נוספו ${parsed.length} פריטים`);
      closeAddPanel();
    };

    window.toggleItem = async (key) => {
      const item = allItems[key];
      if (!item) return;
      const nowDone = !item.done;
      await update(ref(db, `items_v2/${currentListId}/${key}`), {
        done: nowDone, doneBy: nowDone ? currentUser.email : null, doneAt: nowDone ? Date.now() : null
      });
      const prevDoneCount = Object.values(allItems).filter(v => v.done).length;
      if (nowDone && prevDoneCount === 0 && !shoppingStarted) {
        shoppingStarted = true;
        await push(ref(db, 'notifications'), {
          type: 'shopping_started', by: currentUser.email,
          name: currentUser.displayName?.split(' ')[0] || currentUser.email.split('@')[0], at: Date.now()
        });
      }
      const allEntries = Object.entries(allItems);
      if (allEntries.length > 0) {
        const allDoneNow = allEntries.every(([k, v]) => k === key ? nowDone : v.done);
        if (allDoneNow) {
          await push(ref(db, 'notifications'), {
            type: 'done', by: currentUser.email,
            name: currentUser.displayName?.split(' ')[0] || currentUser.email.split('@')[0], at: Date.now()
          });
          toast("🎉 כל הפריטים נלקחו! כל הכבוד!", 'success', 4000);
        }
      }
    };

    window.deleteItem = async (key) => {
      await remove(ref(db, `items_v2/${currentListId}/${key}`));
    };

    window.updateQty = async (key, delta) => {
      const item = allItems[key];
      if (!item) return;
      const match = item.qty.match(/^(\d+)(.*)/);
      if (!match) return;
      let num = Math.max(1, parseInt(match[1]) + delta);
      const unit = match[2] || ' יח׳';
      await update(ref(db, `items_v2/${currentListId}/${key}`), { qty: num + unit });
    };

    window.clearDone = async () => {
      const doneKeys = Object.keys(allItems).filter(k => allItems[k].done);
      if (!doneKeys.length) return;
      const updates = {};
      doneKeys.forEach(k => updates[k] = null);
      await update(ref(db, `items_v2/${currentListId}`), updates);
      toast("🗑️ נמחקו פריטים שנלקחו");
    };

    window.clearAll = async () => {
      if (!confirm('למחוק את כל הרשימה?')) return;
      await remove(ref(db, `items_v2/${currentListId}`));
      shoppingStarted = false;
      toast("🗑️ הרשימה נוקתה");
    };

    // ---- NOTIFICATIONS ----
    let lastNotifAt = Date.now();
    function listenNotifications() {
      onValue(ref(db, 'notifications'), snap => {
        const data = snap.val();
        if (!data || !currentUser) return;
        const all = Object.values(data).sort((a, b) => a.at - b.at);
        const latest = all[all.length - 1];
        if (!latest || latest.at <= lastNotifAt || latest.by === currentUser.email) return;
        lastNotifAt = latest.at;
        const who = latest.name || latest.by.split('@')[0];
        if (latest.type === 'new_list') {
          const msg = `${who} הוסיפ/ה ${latest.count} פריטים${latest.listName ? ' ל' + latest.listName : ''}`;
          toast('📋 ' + msg, 'info', 5000); pushNotify("📋 רשימה חדשה", msg); beep();
        }
        if (latest.type === 'shopping_started') {
          const msg = `${who} התחיל/ה לקנות!`;
          toast('🛒 ' + msg, 'info', 5000); pushNotify("🛒 הקניות התחילו!", msg); beep();
        }
        if (latest.type === 'done') {
          const msg = `${who} סיים/ה את הקניות!`;
          toast('🎉 ' + msg, 'success', 6000); pushNotify("🎉 הקניות הסתיימו!", msg); beepSuccess();
        }
      });
    }

    // ---- SERVICE WORKER ----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const swCode = `const CACHE='shopping-v3';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('activate',e=>{self.clients.claim();});self.addEventListener('fetch',e=>{});self.addEventListener('push',e=>{let d={title:'🧺 קניות שלנו',body:'יש עדכון!'};try{d=e.data.json();}catch{}e.waitUntil(self.registration.showNotification(d.title,{body:d.body,tag:'shopping',renotify:true,vibrate:[200,100,200]}));});`;
          const blob = new Blob([swCode], {type:'application/javascript'});
          await navigator.serviceWorker.register(URL.createObjectURL(blob), {scope:'/'});
        } catch(e) {}
      });
    }

    async function requestPushPermission() { updateBellButton(); }

    async function enableNotifications() {
      if (!('Notification' in window)) { toast('הדפדפן לא תומך בהתראות', 'error'); return; }
      const perm = await Notification.requestPermission();
      if (perm === 'granted') { toast('🔔 התראות הופעלו!', 'success', 3000); }
      else if (perm === 'denied') { toast('❌ חסמת התראות — אפשר בהגדרות', 'error', 4000); }
      updateBellButton();
    }

    function updateBellButton() {
      const btn = document.getElementById('bellBtn');
      if (!btn) return;
      const perm = 'Notification' in window ? Notification.permission : 'unsupported';
      btn.textContent = perm === 'denied' ? '🔕' : '🔔';
      if (perm !== 'granted' && perm !== 'denied') btn.onclick = enableNotifications;
    }

    function pushNotify(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification(title, { body, tag: 'shopping', renotify: true }); } catch(e) {}
      }
    }

    function beep() {
      try {
        const ctx = new AudioContext(), osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.15);
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(); osc.stop(ctx.currentTime + 0.4);
      } catch(e) {}
    }

    function beepSuccess() {
      try {
        const ctx = new AudioContext();
        [523, 659, 784, 1047].forEach((freq, i) => {
          const osc = ctx.createOscillator(), g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.frequency.value = freq;
          const t = ctx.currentTime + i * 0.12;
          g.gain.setValueAtTime(0.15, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t); osc.stop(t + 0.3);
        });
      } catch(e) {}
    }

    window._allItems = () => allItems;
    window.enableNotifications = enableNotifications;
  </script>

  <style>
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #22263a;
      --card: #1e2130;
      --card2: #252840;
      --border: #2e3250;
      --border2: #3a3f5c;
      --text: #f0f2ff;
      --text2: #8891b8;
      --text3: #4a5175;
      --green: #22c55e;
      --green-dark: #16a34a;
      --green-glow: rgba(34,197,94,0.15);
      --green-bg: rgba(34,197,94,0.08);
      --blue: #6366f1;
      --blue-light: rgba(99,102,241,0.15);
      --red: #ef4444;
      --red-light: rgba(239,68,68,0.12);
      --orange: #f59e0b;
      --orange-light: rgba(245,158,11,0.12);
      --radius: 14px;
      --shadow: 0 4px 20px rgba(0,0,0,.4);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.5);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html, body {
      height:100%; font-family:'Heebo',sans-serif;
      background:var(--bg); color:var(--text);
      direction:rtl; overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    /* ─── LOGIN ─── */
    #loginScreen {
      position:fixed; inset:0; z-index:200;
      display:flex; align-items:center; justify-content:center;
      background: radial-gradient(ellipse at 50% 0%, rgba(34,197,94,0.12) 0%, var(--bg) 60%);
      padding:20px;
    }
    .login-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:28px;
      padding:44px 36px;
      text-align:center;
      width:100%; max-width:360px;
      box-shadow: var(--shadow-lg), 0 0 60px rgba(34,197,94,0.08);
      animation: fadeUp .45s cubic-bezier(.16,1,.3,1);
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .login-logo-wrap {
      width:80px; height:80px; border-radius:24px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display:flex; align-items:center; justify-content:center;
      font-size:42px; margin:0 auto 24px;
      box-shadow: 0 8px 30px rgba(34,197,94,0.35);
    }
    .login-title { font-size:28px; font-weight:900; margin-bottom:8px; letter-spacing:-0.5px; }
    .login-sub { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:36px; }
    .google-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      width:100%; padding:15px 20px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color:#fff; border:none; border-radius:14px;
      font-family:'Heebo',sans-serif; font-size:16px; font-weight:800;
      cursor:pointer; transition:all .2s;
      box-shadow: 0 4px 20px rgba(34,197,94,0.3);
    }
    .google-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(34,197,94,0.4); }
    .google-btn:active { transform:scale(.98); }
    .glogo { width:20px; height:20px; border-radius:50%; background:white; padding:2px; }
    .login-note { font-size:12px; color:var(--text3); margin-top:18px; }

    /* ─── APP ─── */
    #appScreen { display:none; }
    .app { max-width:540px; margin:0 auto; padding-bottom:calc(96px + var(--safe-bottom)); min-height:100vh; }

    /* ─── HEADER ─── */
    .header {
      background:rgba(15,17,23,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom:1px solid var(--border);
      padding: calc(env(safe-area-inset-top,0px) + 14px) 16px 0;
      position:sticky; top:0; z-index:50;
    }
    .header-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px; }
    .header-brand { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
    .header-brand-icon {
      width:34px; height:34px; border-radius:10px;
      background:linear-gradient(135deg, var(--green), var(--green-dark));
      display:flex; align-items:center; justify-content:center; font-size:18px;
      flex-shrink:0;
    }
    .header-brand-name {
      font-size:17px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .header-list-name {
      font-size:12px; color:var(--text2); font-weight:500;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .header-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .badge-user {
      display:flex; align-items:center; gap:5px;
      background:var(--green-bg); color:var(--green);
      border:1px solid rgba(34,197,94,0.2);
      padding:5px 10px; border-radius:100px; font-size:12px; font-weight:700;
    }
    .live-dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
    .btn-icon {
      width:34px; height:34px; border-radius:10px;
      border:1px solid var(--border); background:var(--card2);
      display:flex; align-items:center; justify-content:center;
      font-size:15px; cursor:pointer; transition:all .15s; color:var(--text2);
    }
    .btn-icon:hover { background:var(--bg3); }

    /* ─── PROGRESS ─── */
    .progress-strip { display:flex; align-items:center; gap:10px; padding:0 2px 12px; }
    .progress-track { flex:1; height:5px; background:var(--bg3); border-radius:100px; overflow:hidden; }
    .progress-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg, var(--green), #4ade80);
      border-radius:100px; transition:width .6s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 0 10px rgba(34,197,94,0.5);
    }
    .progress-text { font-size:12px; font-weight:700; color:var(--text2); white-space:nowrap; }

    /* ─── LISTS BAR ─── */
    .lists-bar-wrap {
      display:flex; align-items:center; gap:0;
      overflow-x:auto; scrollbar-width:none; padding:0 2px 10px;
      border-bottom:1px solid var(--border);
      margin:0 -16px; padding:0 16px 10px;
    }
    .lists-bar-wrap::-webkit-scrollbar { display:none; }
    .list-tab {
      flex-shrink:0; padding:6px 14px;
      border-radius:100px; border:1px solid var(--border);
      background:transparent; color:var(--text2);
      font-family:'Heebo',sans-serif; font-size:13px; font-weight:600;
      cursor:pointer; transition:all .18s; white-space:nowrap; margin-left:6px;
    }
    .list-tab.active {
      background:var(--green-bg); color:var(--green);
      border-color:rgba(34,197,94,0.3);
    }
    .list-tab-new {
      background:transparent; color:var(--text3);
      border-style:dashed;
      font-size:16px; padding:5px 10px;
    }
    .list-tab-new:hover { color:var(--green); border-color:var(--green); }

    /* ─── BODY ─── */
    .body { padding:16px 16px 0; }

    /* ─── CATEGORY ─── */
    .cat-section { margin-bottom:4px; }
    .cat-header {
      display:flex; align-items:center; gap:8px; padding:10px 4px 6px;
      cursor:pointer; user-select:none;
    }
    .cat-header-icon { font-size:17px; }
    .cat-header-name { font-size:12px; font-weight:800; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; flex:1; }
    .cat-header-count {
      font-size:11px; font-weight:700; color:var(--text3);
      background:var(--bg3); padding:2px 8px; border-radius:100px;
    }
    .cat-header-arrow { font-size:11px; color:var(--text3); transition:transform .2s; }

    const n = name.toLowerCase().trim();
    if (KW[n]) return KW[n];
    let best = null, bestLen = 0;
    for (const [kw, cat] of Object.entries(KW)) {
      if (n.includes(kw) && kw.length > bestLen) {
        best = cat; bestLen = kw.length;
      }
    }
    return best || 'אחר';
  }

  // ─── WEIGHT / QUANTITY PARSING ───
  const WEIGHT_UNITS = ['ק"ג','קג','קילו','ק׳','kg','גרם','gr','גר','ליטר','ל׳','מל','ml'];
  const UNIT_DISPLAY = {
    'ק"ג':'ק"ג','קג':'ק"ג','קילו':'ק"ג','ק׳':'ק"ג','kg':'ק"ג',
    'גרם':'גר','gr':'גר','גר':'גר',
    'ליטר':'ל','ל׳':'ל',
    'מל':'מל','ml':'מל',
  };

  function parseQuantity(text) {
    // "קילו X", "2 ק"ג X", "X 3", "3 X", "X קילו"
    const weightRx = new RegExp(`(\\d+[.,]?\\d*)\\s*(${WEIGHT_UNITS.join('|')})`, 'i');
    const weightRx2 = new RegExp(`(${WEIGHT_UNITS.join('|')})\\s*(\\d+[.,]?\\d*)?`, 'i');
    const numRx = /^(\d+)\s+/;
    const numEndRx = /\s+(\d+)$/;

    let m;
    m = text.match(weightRx);
    if (m) {
      const unit = UNIT_DISPLAY[m[2].toLowerCase()] || m[2];
      return { qty: m[1] + ' ' + unit, clean: text.replace(m[0], '').trim() };
    }
    // "קילו חזה עוף" → 1 ק"ג
    m = text.match(weightRx2);
    if (m) {
      const unit = UNIT_DISPLAY[m[1].toLowerCase()] || m[1];
      const num = m[2] || '1';
      return { qty: num + ' ' + unit, clean: text.replace(m[0], '').trim() };
    }
    m = text.match(numRx);
    if (m) return { qty: m[1], clean: text.slice(m[0].length).trim() };
    m = text.match(numEndRx);
    if (m) return { qty: m[1], clean: text.slice(0, text.lastIndexOf(m[1])).trim() };
    return { qty: '1', clean: text };
  }

  function smartSplit(text) {
    let working = ' ' + text + ' ';
    const ph = {};
    let i = 0;
    [...MULTI_WORD].sort((a, b) => b.length - a.length).forEach(phrase => {
      if (working.includes(phrase)) {
        const key = `§${i++}§`;
        ph[key] = phrase;
        working = working.split(phrase).join(key);
      }
    });
    return working.trim().split(/\s+/)
      .map(p => ph[p] || p)
      .filter(p => p.length > 1 && !p.startsWith('§'));
  }

  function parseRaw(text) {
    let lines;
    const t = text.trim();
    if (/[\n\r]/.test(t)) lines = t.split(/[\n\r]+/);
    else if (/[,،;]/.test(t)) lines = t.split(/[,،;]+/);
    else if (!/ /.test(t)) lines = [t];
    else lines = smartSplit(t);

    return lines
      .map(line => line.replace(/^[\d]+[.)]\s*/, '').replace(/^[-•*]\s*/, '').replace(/^ו(?=[א-ת])/, '').trim())
      .filter(l => l.length > 1)
      .map(cleaned => {
        const { qty, clean } = parseQuantity(cleaned);
        const name = clean || cleaned;
        return { name: name.trim(), qty, category: getCat(name.trim()) };
      })
      .filter(i => i.name.length > 1);
  }

  // ─── UI STATE ───
  let editMode = false;
  let collapsedCats = new Set();

  function renderList() {
    const items = window._allItems ? window._allItems() : {};
    const container = document.getElementById('listContainer');
    const entries = Object.entries(items);
    const pending = entries.filter(([,v]) => !v.done);
    const done = entries.filter(([,v]) => v.done);

    updateProgress(pending.length, done.length);

    if (!entries.length) {
      container.innerHTML = `<div class="empty-state">
        <span class="empty-emoji">🧺</span>
        <div class="empty-title">הרשימה ריקה</div>
        <div class="empty-sub">לחץ על "הוסף פריטים" ורשום<br>בחופשיות מה צריך לקנות</div>
      </div>`;
      return;
    }

    const grouped = {};
    Object.keys(CATS).forEach(c => grouped[c] = []);
    grouped['אחר'] = [];
    pending.forEach(([k,v]) => {
      const cat = v.category || 'אחר';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push([k,v]);
    });

    let html = '';
    for (const [cat, citems] of Object.entries(grouped)) {
      if (!citems.length) continue;
      const icon = CATS[cat] || '🛍️';
      const collapsed = collapsedCats.has(cat);
      html += `<div class="cat-section">
        <div class="cat-header ${collapsed?'collapsed':''}" onclick="toggleCat('${cat}')">
          <span class="cat-header-icon">${icon}</span>
          <span class="cat-header-name">${cat}</span>
          <span class="cat-header-count">${citems.length}</span>
          <span class="cat-header-arrow">▾</span>
        </div>
        <div class="cat-items ${collapsed?'hidden':''} ${editMode?'edit-active':''}">
          ${citems.map(([k,v]) => itemHTML(k,v)).join('')}
        </div></div>`;
    }

    if (done.length) {
      html += `<div class="done-divider">
        <div class="done-line"></div>
        <div class="done-label">✓ נלקח מהמדף (${done.length})</div>
        <div class="done-line"></div>
      </div>
      <div class="${editMode?'edit-active':''}">
        ${done.map(([k,v]) => itemHTML(k,v)).join('')}
      </div>`;
    }

    container.innerHTML = html;
  }

  function itemHTML(key, item) {
    const emoji = getItemEmoji(item.name);
    const catEmoji = CAT_IMG_FALLBACK[item.category] || '🛍️';
    const imgContent = emoji
      ? `<span class="item-img-fallback">${emoji}</span>`
      : `<span class="item-img-fallback">${catEmoji}</span>`;

    return `<div class="item-card ${item.done?'done':''}" id="item-${key}">
      <div class="item-img-wrap">${imgContent}</div>
      <div class="item-main" onclick="toggleItem('${key}')">
        <div class="item-name">${item.name}</div>
      </div>
      <div class="item-right">
        <div class="qty-control">
          <button class="qty-btn" onclick="updateQty('${key}',-1)">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" onclick="updateQty('${key}',1)">＋</button>
        </div>
        <div class="cb" onclick="toggleItem('${key}')"><span class="cb-check">✓</span></div>
        <button class="item-delete" onclick="deleteItem('${key}')">✕</button>
      </div>
    </div>`;
  }

  function updateProgress(pendingCount, doneCount) {
    const total = pendingCount + doneCount;
    const pct = total ? Math.round(doneCount/total*100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${doneCount} / ${total}`;
  }

  function toggleEditMode() {
    editMode = !editMode;
    const btn = document.getElementById('editBtn');
    const bar = document.getElementById('editBar');
    btn.textContent = editMode ? '✓ סיים' : '✏️ עריכה';
    btn.classList.toggle('active', editMode);
    bar.classList.toggle('show', editMode);
    renderList();
  }

  function toggleCat(cat) {
    if (collapsedCats.has(cat)) collapsedCats.delete(cat);
    else collapsedCats.add(cat);
    renderList();
  }

  function openAddPanel() {
    document.getElementById('addPanel').classList.add('open');
    document.getElementById('overlay').classList.add('show');
    setTimeout(() => document.getElementById('rawInput').focus(), 350);
  }

  function closeAddPanel() {
    document.getElementById('addPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  let toastTimer;
  function toast(msg, type='default', dur=2800) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), dur);
  }

  // Expose globals
  window.renderList = renderList;
  window.toast = toast;
  window.toggleCat = toggleCat;
  window.openAddPanel = openAddPanel;
  window.closeAddPanel = closeAddPanel;
  window.toggleEditMode = toggleEditMode;

  document.addEventListener('DOMContentLoaded', () => {
    const ta = document.getElementById('rawInput');
    if (ta) {
      ta.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 200) + 'px';
      });
      ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); addItems(); }
      });
    }
  });
</script>
</body>
</html>
